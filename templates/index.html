<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNMUTE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <header>
        <div class="logo">UN<em>MUTE</em></div>
        <div class="status-pill listening" id="pill">
            <div class="dot"></div>
            <span id="pillText">Connecting...</span>
        </div>
    </header>

    <main>
        <!-- Input -->
        <div class="input-block">
            <textarea id="thoughtInput" placeholder="Type your thought..." rows="3"></textarea>
            <div class="input-footer">
                <span class="input-hint">↵ Enter to generate</span>
                <button class="btn btn-generate" id="generateBtn" onclick="generate()">Generate</button>
            </div>
        </div>

        <!-- Ready panel -->
        <div class="ready-panel" id="readyPanel">
            <span class="ready-label">Queued</span>
            <span class="ready-text" id="readyText"></span>
            <button class="btn btn-speak" onclick="speak()">▶ Speak</button>
            <button class="btn btn-stop" onclick="stop()">■ Stop</button>
        </div>

        <!-- Countdown bar -->
        <div class="countdown-wrap" id="countdownWrap">
            <div class="countdown-header">
                <span class="countdown-label">Firing in 1s — click Stop to cancel</span>
            </div>
            <div class="countdown-bar-bg">
                <div class="countdown-bar" id="countdownBar"></div>
            </div>
        </div>

        <!-- Transcript -->
        <div>
            <div class="section-label">Live transcript</div>
            <div class="transcript-box" id="transcript">
                <div class="t-line partial">— waiting for audio —</div>
            </div>
        </div>

        <!-- Trigger settings -->
        <div class="triggers-panel">
            <div class="triggers-top">
                <span class="triggers-title">Auto-fire trigger words</span>
                <div class="toggle-wrap">
                    <span class="toggle-label" id="toggleLabel">On</span>
                    <label class="toggle">
                        <input type="checkbox" id="triggerToggle" checked onchange="updateTriggers()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="tag-input-wrap" id="tagWrap">
                <input class="tag-add" id="tagInput" placeholder="+ add word" onkeydown="handleTagKey(event)">
            </div>
        </div>
    </main>

    <footer>
        <span class="footer-text">meeting voice proxy · elevenlabs</span>
        <span class="footer-text" id="footerStatus"></span>
    </footer>

    <script src="/static/main.js"></script>
</body>

</html>
